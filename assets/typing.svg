<!-- https://github.com/DenverCoder1/readme-typing-svg/ -->
<svg xmlns='http://www.w3.org/2000/svg' xmlns:xlink='http://www.w3.org/1999/xlink' viewBox='0 0 435 48'
    style='background-color: #00000000;' width='435px' height='48px'>

    <style>
        @font-face {
            font-family: 'VT323';
            font-style: normal;
            font-weight: 400;
            font-display: fallback;
            src: url(data:font/truetype;base64,) format('truetype');
        }
    </style>

    <path id='path0'>
        <!-- Single line -->
        <animate id='d0' attributeName='d' begin='0s;d0.end' dur='6000ms' fill='remove'
            values='m0,24 h0 ; m0,24 h435 ; m0,24 h435 ; m0,24 h0' keyTimes='0;0.66666666666667;0.83333333333333;1' />
    </path>
    <text font-family='"VT323", monospace' fill='#36BCF7' font-size='32' dominant-baseline='middle' x='50%'
        text-anchor='middle' letter-spacing='normal'>
        <textPath xlink:href='#path0'>
            Hi there, I&#039;m Lucas! 👋
        </textPath>
    </text>
</svg>